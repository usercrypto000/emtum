<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#ffffff"/>
  <rect x="56" y="56" width="1488" height="788" rx="18" fill="#ffffff" stroke="#111827" stroke-width="3"/>

  <text x="96" y="128" fill="#111827" font-family="Inter, Arial, Helvetica, sans-serif" font-size="42" font-weight="700">
    Scoped Authorization Proof
  </text>
  <text x="96" y="172" fill="#4b5563" font-family="Inter, Arial, Helvetica, sans-serif" font-size="22">
    Private authorization data enters the circuit. The verifier sees only the committed root and claimed action hash.
  </text>

  <line x1="760" y1="220" x2="760" y2="748" stroke="#d1d5db" stroke-width="2" stroke-dasharray="8 10"/>
  <text x="96" y="232" fill="#374151" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18" font-weight="700">
    PRIVATE WITNESS
  </text>
  <text x="1032" y="232" fill="#374151" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18" font-weight="700">
    PUBLIC VERIFICATION
  </text>

  <rect x="96" y="270" width="330" height="268" rx="10" fill="#f9fafb" stroke="#111827" stroke-width="2"/>
  <text x="126" y="316" fill="#111827" font-family="Inter, Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    Leaf preimage
  </text>
  <rect x="126" y="346" width="270" height="38" rx="6" fill="#ffffff" stroke="#9ca3af"/>
  <text x="146" y="371" fill="#111827" font-family="JetBrains Mono, Consolas, monospace" font-size="18">action_type</text>
  <rect x="126" y="398" width="270" height="38" rx="6" fill="#ffffff" stroke="#9ca3af"/>
  <text x="146" y="423" fill="#111827" font-family="JetBrains Mono, Consolas, monospace" font-size="18">scope</text>
  <rect x="126" y="450" width="270" height="38" rx="6" fill="#ffffff" stroke="#9ca3af"/>
  <text x="146" y="475" fill="#111827" font-family="JetBrains Mono, Consolas, monospace" font-size="18">expiry</text>
  <rect x="126" y="502" width="270" height="38" rx="6" fill="#ffffff" stroke="#9ca3af"/>
  <text x="146" y="527" fill="#111827" font-family="JetBrains Mono, Consolas, monospace" font-size="18">agent_salt</text>

  <rect x="96" y="592" width="330" height="112" rx="10" fill="#f9fafb" stroke="#111827" stroke-width="2"/>
  <text x="126" y="638" fill="#111827" font-family="Inter, Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    Private Merkle path
  </text>
  <text x="126" y="674" fill="#4b5563" font-family="JetBrains Mono, Consolas, monospace" font-size="18">
    path[8], indices[8]
  </text>

  <circle cx="520" cy="334" r="18" fill="#ffffff" stroke="#111827" stroke-width="2"/>
  <circle cx="520" cy="404" r="18" fill="#ffffff" stroke="#111827" stroke-width="2"/>
  <circle cx="520" cy="474" r="18" fill="#ffffff" stroke="#111827" stroke-width="2"/>
  <circle cx="520" cy="544" r="18" fill="#ffffff" stroke="#111827" stroke-width="2"/>
  <circle cx="520" cy="614" r="18" fill="#ffffff" stroke="#111827" stroke-width="2"/>
  <path d="M520 352V386" stroke="#111827" stroke-width="2"/>
  <path d="M520 422V456" stroke="#111827" stroke-width="2"/>
  <path d="M520 492V526" stroke="#111827" stroke-width="2"/>
  <path d="M520 562V596" stroke="#111827" stroke-width="2"/>
  <path d="M538 404H592" stroke="#9ca3af" stroke-width="2"/>
  <path d="M538 544H592" stroke="#9ca3af" stroke-width="2"/>
  <circle cx="610" cy="404" r="18" fill="#f3f4f6" stroke="#6b7280" stroke-width="2"/>
  <circle cx="610" cy="544" r="18" fill="#f3f4f6" stroke="#6b7280" stroke-width="2"/>
  <text x="492" y="666" fill="#6b7280" font-family="Inter, Arial, Helvetica, sans-serif" font-size="16">
    siblings and left/right bits stay hidden
  </text>

  <path d="M426 404H670" stroke="#111827" stroke-width="2.5"/>
  <path d="M426 648H670" stroke="#111827" stroke-width="2.5"/>
  <path d="M658 392L680 404L658 416" stroke="#111827" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M658 636L680 648L658 660" stroke="#111827" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="680" y="326" width="264" height="392" rx="16" fill="#111827"/>
  <rect x="696" y="342" width="232" height="360" rx="10" fill="#ffffff" stroke="#111827" stroke-width="2"/>
  <text x="746" y="416" fill="#111827" font-family="Inter, Arial, Helvetica, sans-serif" font-size="28" font-weight="700">
    ZK Proof
  </text>
  <text x="732" y="468" fill="#374151" font-family="Inter, Arial, Helvetica, sans-serif" font-size="19">
    constraints:
  </text>
  <text x="728" y="512" fill="#111827" font-family="JetBrains Mono, Consolas, monospace" font-size="17">
    leaf == action_hash
  </text>
  <text x="728" y="548" fill="#111827" font-family="JetBrains Mono, Consolas, monospace" font-size="17">
    root == policy_root
  </text>
  <line x1="728" y1="590" x2="896" y2="590" stroke="#d1d5db"/>
  <text x="730" y="636" fill="#4b5563" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18">
    preimage and path
  </text>
  <text x="740" y="666" fill="#4b5563" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18">
    are not revealed
  </text>

  <path d="M944 452H1054" stroke="#111827" stroke-width="2.5"/>
  <path d="M1038 440L1060 452L1038 464" stroke="#111827" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M944 592H1054" stroke="#111827" stroke-width="2.5"/>
  <path d="M1038 580L1060 592L1038 604" stroke="#111827" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="1060" y="382" width="350" height="94" rx="10" fill="#ecfdf5" stroke="#047857" stroke-width="2"/>
  <text x="1090" y="420" fill="#065f46" font-family="Inter, Arial, Helvetica, sans-serif" font-size="20" font-weight="700">
    Public input
  </text>
  <text x="1090" y="452" fill="#111827" font-family="JetBrains Mono, Consolas, monospace" font-size="24">
    action_hash
  </text>

  <rect x="1060" y="522" width="350" height="94" rx="10" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="1090" y="560" fill="#1e40af" font-family="Inter, Arial, Helvetica, sans-serif" font-size="20" font-weight="700">
    Public input
  </text>
  <text x="1090" y="592" fill="#111827" font-family="JetBrains Mono, Consolas, monospace" font-size="24">
    policy_root
  </text>

  <rect x="1060" y="660" width="350" height="62" rx="10" fill="#ffffff" stroke="#9ca3af" stroke-dasharray="8 8"/>
  <text x="1090" y="699" fill="#6b7280" font-family="Inter, Arial, Helvetica, sans-serif" font-size="19">
    no scope, salt, path, or siblings disclosed
  </text>

  <text x="96" y="802" fill="#111827" font-family="Inter, Arial, Helvetica, sans-serif" font-size="22" font-weight="700">
    Emtun / Scoped Authorization Proofs
  </text>
  <text x="96" y="832" fill="#4b5563" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18">
    A verifier learns that one action is authorized under one committed policy root, without seeing the policy set.
  </text>
</svg>
